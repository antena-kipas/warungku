<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Warung Retail System</title>
    
    <link href="{{ url_for('static', filename='css/output.css') }}" rel="stylesheet">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Inter', sans-serif; }
        
        /* Animasi Masuk Halus */
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-enter {
            animation: fadeUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
    </style>
</head>
<body class="bg-gradient-to-br from-slate-950 via-slate-900 to-slate-800 min-h-screen flex flex-col items-center justify-center p-4 relative overflow-hidden">

    <div class="absolute top-0 left-1/2 -translate-x-1/2 w-[600px] h-[600px] bg-blue-600/20 rounded-full blur-[120px] -z-10 pointer-events-none"></div>

    <div class="w-full max-w-sm animate-enter">
        
        <div class="flex flex-col items-center mb-8">
            <img src="{{ url_for('static', filename='assets/logo_warungku.svg') }}" 
                 alt="Logo Warung" 
                 class="h-28 w-auto mb-4 drop-shadow-[0_0_15px_rgba(255,255,255,0.1)] hover:scale-105 transition-transform duration-300">
            
            <h1 class="text-2xl font-bold text-white tracking-tight">Warungku</h1>
            <p class="text-slate-400 text-sm mt-1">warung retail</p>
        </div>

        <div class="bg-slate-900/50 backdrop-blur-xl border border-white/10 rounded-2xl shadow-2xl p-8">

            {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                <div class="mb-6 space-y-2">
                    {% for category, message in messages %}
                    <div class="px-4 py-3 rounded-lg text-sm font-medium border flex items-center gap-2
                        {% if category == 'danger' %} bg-red-500/10 text-red-200 border-red-500/20
                        {% elif category == 'success' %} bg-emerald-500/10 text-emerald-200 border-emerald-500/20
                        {% else %} bg-blue-500/10 text-blue-200 border-blue-500/20 {% endif %}">
                        {{ message }}
                    </div>
                    {% endfor %}
                </div>
            {% endif %}
            {% endwith %}

            <form action="/login" method="POST" class="space-y-5">
                
                <div class="space-y-1.5">
                    <label for="username" class="block text-sm font-medium text-slate-300 ml-1">Username</label>
                    <div class="relative group">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-slate-500 group-focus-within:text-blue-400 transition-colors">
                            <svg class="size-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                            </svg>
                        </div>
                        <input type="text" id="username" name="username" 
                               class="block w-full pl-10 pr-4 py-3 bg-slate-950/50 border border-slate-700 rounded-xl text-white placeholder:text-slate-600 focus:outline-none focus:ring-2 focus:ring-blue-500/50 focus:border-blue-500 transition-all"
                               placeholder="Masukan username" required>
                    </div>
                </div>

                <div class="space-y-1.5">
                    <label for="password" class="block text-sm font-medium text-slate-300 ml-1">Password</label>
                    <div class="relative group">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-slate-500 group-focus-within:text-blue-400 transition-colors">
                            <svg class="size-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                            </svg>
                        </div>
                        <input type="password" id="password" name="password" 
                               class="block w-full pl-10 pr-4 py-3 bg-slate-950/50 border border-slate-700 rounded-xl text-white placeholder:text-slate-600 focus:outline-none focus:ring-2 focus:ring-blue-500/50 focus:border-blue-500 transition-all"
                               placeholder="••••••••" required>
                    </div>
                </div>

                <button type="submit" 
                        class="w-full py-3 px-4 bg-gradient-to-r from-green-600 to-blue-500 hover:from-green-500 hover:to-blue-400 text-white font-bold rounded-xl shadow-lg shadow-green-500/20 transform transition-all duration-200 hover:-translate-y-0.5 focus:ring-2 focus:ring-offset-2 focus:ring-offset-slate-900 focus:ring-green-500">
                    Masuk Aplikasi
                </button>
            </form>
        </div>

        <p class="mt-8 text-center text-xs text-slate-500">
            &copy; 2026 Warung Retail System by Warung Nenek
        </p>
    </div>

</body>
</html>
